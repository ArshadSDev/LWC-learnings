<template>
    <lightning-card title="Player Carousel Child">
        <div class="slds-p-around_medium">
        
            <div  class="slds-box slds-box_x-small slds-text-align_center slds-m-around_x-small" >
                <lightning-carousel>
                    <template for:each= {playerDetailsChild} for:item="player">                    
                        <lightning-carousel-image key={player.id} class="small-image"
                            src = {player.image}
                            header = {player.name}
                            description = {player.description}
                            alternative-text = "First card accessible description."
                            href = "javascript:void(0);">
                        </lightning-carousel-image>                    
                    </template>
                </lightning-carousel>        
            </div>
    
        </div>
    </lightning-card>
</template>
