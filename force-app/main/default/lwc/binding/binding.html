<template>
    <lightning-card title="Resume">
        <div class="slds-p-around_medium">
            <div>
                <lightning-input type="text" label="First Name" value={firstName} onchange={handlerFirstNameChange}></lightning-input>
            </div>
            <div>
                <lightning-input type="text" label="Last Name" value={lastName} onchange={handlerLastNameChange}></lightning-input>
            </div>
            <div>
                <lightning-input type="number" label="Age" value={age} onchange={handlerAgeChange}></lightning-input>
            </div>
            <div>
                <lightning-input type="text" label="Qualification" value={qualification} onchange={handlerQualificationChange}></lightning-input>
            </div>
            <div class="slds-p-around_medium">
                <lightning-button label="Submit" variant="brand" onclick={handlerSubmitClick}></lightning-button>
            </div>
        </div>
    </lightning-card>
    <template if:true={showDetails}>
        <div class="slds-p-around_medium">
            <lightning-card title="Resume Details">
                <p>Name: {fullName}</p>
                <p>Age: {age}</p>
                <p>Qualification: {qualification}</p>
            </lightning-card>
        </div>
    </template>
</template>
