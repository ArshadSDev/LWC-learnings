<template>
    <lightning-card title="CSS Binding">
        <div class="slds-p-around_medium">
                        <lightning-input type="number" label="Age" value={age} onchange={handlerAgeChange}></lightning-input>
            <div class="slds-p-around_medium">
                <lightning-button label="Check Eligibility" variant="brand" onclick={handlerEligibleClick}></lightning-button>
            </div>
            <div class={choosencolor}>
                Eligible
            </div>
        </div>
        <div class = "slds-p-around_medium">
            <div>
                QA Session :{qaSlots.session}
            </div>
            <div>
                Name :{name}
            </div>
            <lightning-input type="text" label="Book QA Session" value={qaSlots.session} onchange={handlerBookSessionClick}></lightning-input>
            <lightning-input type="text" label="Name" value={name} onchange={handlerNameChange}></lightning-input>

        </div>
    </lightning-card>

</template>
